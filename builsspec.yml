version: 0.2

phases:
  install:
    commands:
      - echo Installing Docker...
  pre_build:
    commands:
      - echo Logging into Docker...
  build:
    commands:
      - echo Build started
      - docker build -t myapp .
  post_build:
    commands:
      - echo Running container
      - docker run -d -p 5000:5000 myapp
